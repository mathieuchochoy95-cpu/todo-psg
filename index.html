<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0A1A3F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="To-Do PSG">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ma To-Do • Mathieu</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230A1A3F'/%3E%3Crect x='3' y='3' width='58' height='58' rx='11' fill='none' stroke='%23C6A15B' stroke-width='2'/%3E%3Cpolygon points='32,11 47,53 17,53' fill='%23DA291C'/%3E%3Cline x1='25' y1='33' x2='39' y2='33' stroke='%230A1A3F' stroke-width='2'/%3E%3Ccircle cx='32' cy='46' r='6' fill='%23C6A15B'/%3E%3C/svg%3E">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230A1A3F'/%3E%3Cpolygon points='32,11 47,53 17,53' fill='%23DA291C'/%3E%3Ccircle cx='32' cy='46' r='6' fill='%23C6A15B'/%3E%3C/svg%3E">
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Ma%20To-Do%20PSG%22%2C%22short_name%22%3A%22To-Do%20PSG%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230A1A3F%22%2C%22theme_color%22%3A%22%230A1A3F%22%7D">
<style>
  :root{
    --navy:#0A1A3F;        /* bleu nuit PSG */
    --navy2:#11264f;
    --navy3:#1c3563;
    --red:#DA291C;         /* rouge PSG */
    --red-d:#b21f15;
    --gold:#C6A15B;        /* or fleur de lys */
    --white:#ffffff;
    --ink:#0c1730;
    --muted:#7d8aa6;
    --line:#e6eaf2;
    --bg:#f4f6fb;
    --ok:#1f9d55;
    --shadow:0 6px 18px rgba(10,26,63,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.4;
    padding-bottom:40px;
  }
  /* ---------- HEADER ---------- */
  header{
    background:linear-gradient(160deg,var(--navy) 0%,var(--navy2) 60%,var(--navy3) 100%);
    color:#fff;padding:18px 16px 16px;position:relative;overflow:hidden;
    border-bottom:4px solid var(--red);
  }
  header::after{content:"";position:absolute;right:-30px;top:-30px;width:160px;height:160px;
    background:radial-gradient(circle,rgba(198,161,91,.18),transparent 70%);}
  .crest{display:flex;align-items:center;gap:12px;}
  .badge{
    width:48px;height:48px;border-radius:50%;flex:0 0 48px;
    background:var(--navy);border:2px solid var(--gold);
    display:flex;align-items:center;justify-content:center;
  }
  .badge svg{width:30px;height:30px;}
  .h-txt h1{margin:0;font-size:19px;letter-spacing:.5px;font-weight:800;text-transform:uppercase;}
  .h-txt p{margin:2px 0 0;font-size:12px;color:#aab8d8;}
  .stripe{height:6px;display:flex;margin-top:14px;border-radius:4px;overflow:hidden;}
  .stripe i{flex:1;}
  .stripe i:nth-child(1){background:var(--navy3);}
  .stripe i:nth-child(2){background:var(--red);}
  .stripe i:nth-child(3){background:var(--gold);}
  /* ---------- STATS ---------- */
  .stats{display:flex;gap:8px;padding:12px 16px 0;}
  .stat{flex:1;background:#fff;border:1px solid var(--line);border-radius:12px;
    padding:10px;text-align:center;box-shadow:var(--shadow);}
  .stat b{display:block;font-size:20px;color:var(--navy);}
  .stat span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
  .stat.red b{color:var(--red);}
  .stat.gold b{color:#a07d2e;}
  /* ---------- FORM ---------- */
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;
    margin:12px 16px;box-shadow:var(--shadow);}
  .form-head{padding:12px 14px 0;font-size:13px;font-weight:700;color:var(--navy);
    text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:6px;}
  .form-head .dot{width:8px;height:8px;border-radius:50%;background:var(--red);}
  form{padding:10px 14px 14px;}
  label{display:block;font-size:11px;color:var(--muted);font-weight:600;
    text-transform:uppercase;letter-spacing:.4px;margin:8px 2px 4px;}
  input[type=text],input[type=date],select,textarea{
    width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;
    font-size:16px;font-family:inherit;background:#fbfcfe;color:var(--ink);outline:none;
  }
  input:focus,select:focus,textarea:focus{border-color:var(--navy3);background:#fff;}
  textarea{resize:vertical;min-height:46px;}
  .row{display:flex;gap:10px;}
  .row>div{flex:1;}
  .btns{display:flex;gap:8px;margin-top:12px;}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;font-weight:700;}
  .btn-add{flex:1;background:var(--red);color:#fff;padding:13px;font-size:15px;
    box-shadow:0 4px 12px rgba(218,41,28,.3);}
  .btn-add:active{background:var(--red-d);}
  .btn-cancel{background:#eef1f7;color:var(--muted);padding:13px 16px;font-size:14px;display:none;}
  /* ---------- TOOLBAR ---------- */
  .toolbar{display:flex;gap:8px;align-items:center;padding:4px 16px 0;flex-wrap:wrap;}
  .toolbar select{width:auto;flex:1;padding:9px 10px;font-size:13px;}
  .toolbar label{margin:0;}
  /* ---------- TASKS ---------- */
  .list{padding:6px 16px 0;}
  .empty{text-align:center;color:var(--muted);padding:30px 10px;font-size:14px;}
  .empty svg{width:54px;height:54px;opacity:.5;margin-bottom:8px;}
  .task{background:#fff;border:1px solid var(--line);border-left:5px solid var(--navy3);
    border-radius:12px;padding:12px 12px 12px 12px;margin-bottom:10px;box-shadow:var(--shadow);
    display:flex;gap:10px;align-items:flex-start;transition:.15s;}
  .task.p-haute{border-left-color:var(--red);}
  .task.p-moyenne{border-left-color:var(--gold);}
  .task.p-basse{border-left-color:var(--navy3);}
  .task.done{opacity:.55;}
  .task.done .t-title{text-decoration:line-through;}
  .check{width:26px;height:26px;flex:0 0 26px;border-radius:50%;border:2px solid var(--navy3);
    background:#fff;margin-top:1px;display:flex;align-items:center;justify-content:center;padding:0;}
  .check.on{background:var(--ok);border-color:var(--ok);}
  .check svg{width:14px;height:14px;display:none;}
  .check.on svg{display:block;}
  .t-body{flex:1;min-width:0;}
  .t-title{font-size:15px;font-weight:700;color:var(--ink);word-break:break-word;}
  .t-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px;}
  .pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;
    display:inline-flex;align-items:center;gap:4px;letter-spacing:.2px;}
  .pill.date{background:#eef2fb;color:var(--navy);}
  .pill.date.late{background:#fdecea;color:var(--red);}
  .pill.date.soon{background:#fff5e6;color:#9a6b00;}
  .pill.prio-haute{background:#fdecea;color:var(--red);}
  .pill.prio-moyenne{background:#fbf2df;color:#8a6516;}
  .pill.prio-basse{background:#eef2fb;color:var(--navy3);}
  .pill.st{background:#eef7f0;color:var(--ok);}
  .pill.st.todo{background:#f0f2f7;color:var(--muted);}
  .pill.st.doing{background:#e9f0fd;color:#1b4ea8;}
  .t-notes{font-size:13px;color:var(--muted);margin-top:7px;white-space:pre-wrap;word-break:break-word;}
  .t-actions{display:flex;flex-direction:column;gap:6px;}
  .ico{width:32px;height:32px;background:#f3f5fa;color:var(--navy);padding:0;
    display:flex;align-items:center;justify-content:center;border-radius:8px;}
  .ico svg{width:16px;height:16px;}
  .ico.del{color:var(--red);}
  .ico.bell{color:#a07d2e;background:#fbf2df;}
  .ico:active{background:#e6eaf2;}
  /* ---------- MODAL RAPPEL ---------- */
  .overlay{position:fixed;inset:0;background:rgba(10,26,63,.55);z-index:100;
    display:none;align-items:flex-end;justify-content:center;}
  .overlay.show{display:flex;}
  .sheet{background:#fff;width:100%;max-width:480px;border-radius:18px 18px 0 0;
    padding:18px 18px calc(18px + env(safe-area-inset-bottom));box-shadow:0 -8px 30px rgba(0,0,0,.3);
    animation:up .25s ease;}
  @keyframes up{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .sheet h3{margin:0 0 2px;font-size:16px;color:var(--navy);}
  .sheet .sub{margin:0 0 14px;font-size:13px;color:var(--muted);word-break:break-word;}
  .sheet-btn{display:flex;width:100%;align-items:center;gap:10px;text-align:left;
    background:#f4f6fb;border:1.5px solid var(--line);border-radius:12px;
    padding:14px;margin-bottom:9px;font-size:15px;font-weight:700;color:var(--ink);}
  .sheet-btn:active{background:#e9edf6;}
  .sheet-btn b{color:var(--red);}
  .sheet-btn small{display:block;font-weight:500;color:var(--muted);font-size:12px;margin-top:1px;}
  .sheet-close{width:100%;background:none;color:var(--muted);padding:12px;font-size:14px;font-weight:600;}
  /* ---------- FOOTER ---------- */
  .footer-actions{display:flex;gap:8px;padding:8px 16px 0;}
  .footer-actions button{flex:1;background:var(--navy);color:#fff;padding:11px;font-size:13px;}
  .footer-actions button.ghost{background:#fff;color:var(--navy);border:1.5px solid var(--line);}
  .save-flash{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(80px);
    background:var(--navy);color:#fff;padding:10px 18px;border-radius:30px;font-size:13px;
    font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.25);transition:.3s;z-index:50;opacity:0;}
  .save-flash.show{transform:translateX(-50%) translateY(0);opacity:1;}
  .tip{font-size:11px;color:var(--muted);text-align:center;padding:14px 24px 0;line-height:1.5;}
  @media print{
    .card,.toolbar,.footer-actions,.t-actions,.check,.stats{display:none!important;}
    body{background:#fff;}
    .task{box-shadow:none;break-inside:avoid;}
  }
</style>
</head>
<body>
<header>
  <div class="crest">
    <div class="badge">
      <!-- Tour Eiffel stylisée -->
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2 L15.5 21 H8.5 Z" fill="#DA291C"/>
        <path d="M9.6 11 H14.4 M8.7 16 H15.3" stroke="#0A1A3F" stroke-width="1.1"/>
        <circle cx="12" cy="18.5" r="2.2" fill="#C6A15B"/>
      </svg>
    </div>
    <div class="h-txt">
      <h1>Ma To-Do List</h1>
      <p>Mathieu — Ici c'est Paris 🔴🔵</p>
    </div>
  </div>
  <div class="stripe"><i></i><i></i><i></i></div>
</header>

<div class="stats">
  <div class="stat"><b id="s-total">0</b><span>Tâches</span></div>
  <div class="stat red"><b id="s-late">0</b><span>En retard</span></div>
  <div class="stat gold"><b id="s-todo">0</b><span>À faire</span></div>
  <div class="stat"><b id="s-done">0</b><span>Terminées</span></div>
</div>

<!-- FORMULAIRE -->
<div class="card">
  <div class="form-head"><span class="dot"></span><span id="form-title">Nouvelle tâche</span></div>
  <form id="taskForm" autocomplete="off">
    <input type="hidden" id="editId" value="">
    <label for="task">Tâche</label>
    <input type="text" id="task" placeholder="Ex : Réviser le partiel de maths" required>
    <div class="row">
      <div>
        <label for="date">Échéance</label>
        <input type="date" id="date">
      </div>
      <div>
        <label for="prio">Priorité</label>
        <select id="prio">
          <option value="haute">🔴 Haute</option>
          <option value="moyenne" selected>🟡 Moyenne</option>
          <option value="basse">🔵 Basse</option>
        </select>
      </div>
    </div>
    <label for="statut">Statut</label>
    <select id="statut">
      <option value="todo" selected>À faire</option>
      <option value="doing">En cours</option>
      <option value="done">Terminé</option>
    </select>
    <label for="notes">Notes</label>
    <textarea id="notes" placeholder="Détails, lien, rappel..."></textarea>
    <div class="btns">
      <button type="submit" class="btn-add" id="submitBtn">Ajouter la tâche</button>
      <button type="button" class="btn-cancel" id="cancelBtn">Annuler</button>
    </div>
  </form>
</div>

<!-- TRI -->
<div class="toolbar">
  <label for="sort" style="flex:0 0 auto;">Trier&nbsp;:</label>
  <select id="sort">
    <option value="date">Échéance</option>
    <option value="prio">Priorité</option>
    <option value="statut">Statut</option>
    <option value="created">Ajout récent</option>
  </select>
  <select id="filter">
    <option value="all">Tout afficher</option>
    <option value="active">Non terminées</option>
    <option value="done">Terminées</option>
  </select>
</div>

<!-- LISTE -->
<div class="list" id="list"></div>

<div class="footer-actions">
  <button class="ghost" onclick="window.print()">🖨️ Imprimer / PDF</button>
  <button class="ghost" id="clearDone">🧹 Vider terminées</button>
</div>

<p class="tip">💾 Tout est sauvegardé automatiquement dans ce navigateur.<br>
🔔 Le bouton cloche d'une tâche datée crée un rappel dans ton Calendrier iPhone.</p>

<!-- MENU RAPPEL -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <h3>🔔 Programmer un rappel</h3>
    <p class="sub" id="sheet-task"></p>
    <button class="sheet-btn" data-days="1">📅 <span><b>1 jour</b> avant<small></small></span></button>
    <button class="sheet-btn" data-days="3">📅 <span><b>3 jours</b> avant<small></small></span></button>
    <button class="sheet-btn" data-days="7">📅 <span><b>7 jours</b> avant<small></small></span></button>
    <button class="sheet-close" id="sheetClose">Annuler</button>
  </div>
</div>

<div class="save-flash" id="flash">Enregistré ✓</div>

<script>
const KEY="todo_psg_mathieu_v1";
let tasks=load();
const $=id=>document.getElementById(id);

function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return[]}}
function save(){localStorage.setItem(KEY,JSON.stringify(tasks));flash();}
function flash(){const f=$("flash");f.classList.add("show");clearTimeout(f._t);f._t=setTimeout(()=>f.classList.remove("show"),1100);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

const PRIO_RANK={haute:0,moyenne:1,basse:2};
const ST_RANK={doing:0,todo:1,done:2};
const ST_LABEL={todo:"À faire",doing:"En cours",done:"Terminé"};
const ST_CLASS={todo:"todo",doing:"doing",done:""};
const PRIO_LABEL={haute:"Haute",moyenne:"Moyenne",basse:"Basse"};

function todayStr(){const d=new Date();d.setHours(0,0,0,0);return d;}
function fmtDate(s){
  if(!s)return null;
  const d=new Date(s+"T00:00:00");
  const diff=Math.round((d-todayStr())/86400000);
  const txt=d.toLocaleDateString("fr-FR",{day:"2-digit",month:"short"});
  let cls="",extra="";
  if(diff<0){cls="late";extra=" (retard)";}
  else if(diff===0){cls="soon";extra=" (auj.)";}
  else if(diff===1){cls="soon";extra=" (demain)";}
  else if(diff<=3){cls="soon";}
  return {txt:txt+extra,cls,diff};
}

// ---- FORM ----
$("taskForm").addEventListener("submit",e=>{
  e.preventDefault();
  const t=$("task").value.trim();
  if(!t)return;
  const data={
    task:t,date:$("date").value,prio:$("prio").value,
    statut:$("statut").value,notes:$("notes").value.trim()
  };
  const id=$("editId").value;
  if(id){
    const i=tasks.findIndex(x=>x.id===id);
    if(i>-1)tasks[i]={...tasks[i],...data};
  }else{
    tasks.push({id:uid(),...data,created:Date.now()});
  }
  save();resetForm();render();
});

$("cancelBtn").addEventListener("click",resetForm);

function resetForm(){
  $("taskForm").reset();$("editId").value="";
  $("prio").value="moyenne";$("statut").value="todo";
  $("form-title").textContent="Nouvelle tâche";
  $("submitBtn").textContent="Ajouter la tâche";
  $("cancelBtn").style.display="none";
}

function edit(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  $("editId").value=id;$("task").value=t.task;$("date").value=t.date||"";
  $("prio").value=t.prio;$("statut").value=t.statut;$("notes").value=t.notes||"";
  $("form-title").textContent="Modifier la tâche";
  $("submitBtn").textContent="Enregistrer";
  $("cancelBtn").style.display="block";
  window.scrollTo({top:0,behavior:"smooth"});
}

function toggle(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  t.statut=(t.statut==="done")?"todo":"done";
  save();render();
}
function del(id){
  if(!confirm("Supprimer cette tâche ?"))return;
  tasks=tasks.filter(x=>x.id!==id);save();render();
}
$("clearDone").addEventListener("click",()=>{
  if(!tasks.some(t=>t.statut==="done"))return;
  if(!confirm("Supprimer toutes les tâches terminées ?"))return;
  tasks=tasks.filter(t=>t.statut!=="done");save();render();
});

$("sort").addEventListener("change",render);
$("filter").addEventListener("change",render);

function render(){
  const sort=$("sort").value, filter=$("filter").value;
  let arr=[...tasks];
  if(filter==="active")arr=arr.filter(t=>t.statut!=="done");
  if(filter==="done")arr=arr.filter(t=>t.statut==="done");

  arr.sort((a,b)=>{
    if(sort==="prio")return PRIO_RANK[a.prio]-PRIO_RANK[b.prio];
    if(sort==="statut")return ST_RANK[a.statut]-ST_RANK[b.statut];
    if(sort==="created")return b.created-a.created;
    // date: sans date à la fin
    if(!a.date&&!b.date)return b.created-a.created;
    if(!a.date)return 1;if(!b.date)return -1;
    return a.date.localeCompare(b.date);
  });

  const list=$("list");
  list.innerHTML="";
  if(arr.length===0){
    list.innerHTML='<div class="empty"><svg viewBox="0 0 24 24" fill="none"><rect x="4" y="3" width="16" height="18" rx="2" stroke="#7d8aa6" stroke-width="1.5"/><path d="M8 8h8M8 12h8M8 16h5" stroke="#7d8aa6" stroke-width="1.5" stroke-linecap="round"/></svg><br>Aucune tâche ici.<br>Ajoute ta première tâche ci-dessus ⬆️</div>';
  }
  arr.forEach(t=>{
    const d=fmtDate(t.date);
    const done=t.statut==="done";
    const el=document.createElement("div");
    el.className="task p-"+t.prio+(done?" done":"");
    el.innerHTML=`
      <button class="check ${done?'on':''}" aria-label="Terminer">
        <svg viewBox="0 0 24 24" fill="none"><path d="M5 12l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="t-body">
        <div class="t-title"></div>
        <div class="t-meta">
          ${d?`<span class="pill date ${d.cls}">📅 ${d.txt}</span>`:""}
          <span class="pill prio-${t.prio}">${t.prio==="haute"?"🔴":t.prio==="moyenne"?"🟡":"🔵"} ${PRIO_LABEL[t.prio]}</span>
          <span class="pill st ${ST_CLASS[t.statut]}">${ST_LABEL[t.statut]}</span>
        </div>
        ${t.notes?`<div class="t-notes"></div>`:""}
      </div>
      <div class="t-actions">
        ${(t.date&&!done)?`<button class="ico bell" aria-label="Rappel"><svg viewBox="0 0 24 24" fill="none"><path d="M6 16V10a6 6 0 1112 0v6l2 2H4l2-2z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M10 20a2 2 0 004 0" stroke="currentColor" stroke-width="1.6"/></svg></button>`:""}
        <button class="ico edit" aria-label="Modifier"><svg viewBox="0 0 24 24" fill="none"><path d="M4 20h4L18 10l-4-4L4 16v4z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M13 7l4 4" stroke="currentColor" stroke-width="1.6"/></svg></button>
        <button class="ico del" aria-label="Supprimer"><svg viewBox="0 0 24 24" fill="none"><path d="M5 7h14M9 7V5h6v2M7 7l1 12h8l1-12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      </div>`;
    el.querySelector(".t-title").textContent=t.task;
    if(t.notes)el.querySelector(".t-notes").textContent=t.notes;
    el.querySelector(".check").addEventListener("click",()=>toggle(t.id));
    el.querySelector(".edit").addEventListener("click",()=>edit(t.id));
    el.querySelector(".del").addEventListener("click",()=>del(t.id));
    const bell=el.querySelector(".bell");
    if(bell)bell.addEventListener("click",()=>openReminder(t.id));
    list.appendChild(el);
  });

  // stats
  $("s-total").textContent=tasks.length;
  $("s-done").textContent=tasks.filter(t=>t.statut==="done").length;
  $("s-todo").textContent=tasks.filter(t=>t.statut!=="done").length;
  $("s-late").textContent=tasks.filter(t=>{
    if(t.statut==="done"||!t.date)return false;
    return new Date(t.date+"T00:00:00")<todayStr();
  }).length;
}

// ---- RAPPELS CALENDRIER (.ics) ----
let reminderId=null;
function openReminder(id){
  const t=tasks.find(x=>x.id===id);if(!t||!t.date)return;
  reminderId=id;
  const due=new Date(t.date+"T00:00:00");
  $("sheet-task").textContent=t.task+" • échéance "+due.toLocaleDateString("fr-FR",{weekday:"long",day:"2-digit",month:"long"});
  document.querySelectorAll(".sheet-btn").forEach(b=>{
    const d=new Date(t.date+"T00:00:00");d.setDate(d.getDate()-(+b.dataset.days));
    const past=d<new Date();
    b.querySelector("small").textContent=(past?"⚠️ déjà passé — ":"")+"le "+d.toLocaleDateString("fr-FR",{weekday:"short",day:"2-digit",month:"short"})+" à 9h";
  });
  $("overlay").classList.add("show");
}
function closeReminder(){$("overlay").classList.remove("show");reminderId=null;}
$("sheetClose").addEventListener("click",closeReminder);
$("overlay").addEventListener("click",e=>{if(e.target===$("overlay"))closeReminder();});
document.querySelectorAll(".sheet-btn").forEach(b=>{
  b.addEventListener("click",()=>makeReminder(+b.dataset.days));
});
function pad(n){return String(n).padStart(2,"0");}
function makeReminder(days){
  const t=tasks.find(x=>x.id===reminderId);if(!t)return;
  const due=t.date.replace(/-/g,"");
  const now=new Date();
  const stamp=now.getUTCFullYear()+pad(now.getUTCMonth()+1)+pad(now.getUTCDate())+"T"+pad(now.getUTCHours())+pad(now.getUTCMinutes())+pad(now.getUTCSeconds())+"Z";
  const esc=s=>(s||"").replace(/\\/g,"\\\\").replace(/,/g,"\\,").replace(/;/g,"\\;").replace(/\n/g,"\\n");
  const ics=[
    "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//To-Do PSG//FR","CALSCALE:GREGORIAN","METHOD:PUBLISH",
    "BEGIN:VEVENT","UID:todo-"+t.id+"-"+days+"@psg","DTSTAMP:"+stamp,
    "DTSTART:"+due+"T090000","DTEND:"+due+"T093000",
    "SUMMARY:"+esc("⚽ "+t.task),
    "DESCRIPTION:"+esc("Échéance de ta tâche"+(t.notes?" — "+t.notes:"")),
    "BEGIN:VALARM","ACTION:DISPLAY","DESCRIPTION:"+esc("Rappel : "+t.task),"TRIGGER:-P"+days+"D","END:VALARM",
    "END:VEVENT","END:VCALENDAR"
  ].join("\r\n");
  const isIOS=/iP(hone|ad|od)/.test(navigator.userAgent)||(navigator.platform==="MacIntel"&&navigator.maxTouchPoints>1);
  const fname=("rappel-"+t.task).replace(/[^a-z0-9]+/gi,"-").slice(0,40)+".ics";
  if(isIOS){
    // iPhone : ouvrir l'.ics directement -> iOS propose "Ajouter au calendrier"
    window.location.href="data:text/calendar;charset=utf-8,"+encodeURIComponent(ics);
  }else{
    const blob=new Blob([ics],{type:"text/calendar;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=fname;
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1500);
  }
  closeReminder();
}

resetForm();
render();
</script>
